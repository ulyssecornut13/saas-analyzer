<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Intelligence — Analyseur AGNT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0f0e0c;--paper:#f5f0e8;--paper2:#ede8dc;--paper3:#e3ddd0;
  --accent:#c84b2f;--accent2:#2a5c45;--accent3:#1a3a6b;
  --muted:#8a8070;--border:rgba(15,14,12,0.1);--border2:rgba(15,14,12,0.2);
  --mono:'DM Mono',monospace;--serif:'Fraunces',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--mono);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:0.4;}
.container{max-width:900px;margin:0 auto;padding:60px 40px;}
.header{margin-bottom:56px;position:relative;}
.header-eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.header-eyebrow::before{content:'';display:inline-block;width:24px;height:1px;background:var(--muted);}
.header h1{font-family:var(--serif);font-size:clamp(42px,6vw,72px);font-weight:300;line-height:1.05;letter-spacing:-1px;}
.header h1 em{font-style:italic;color:var(--accent);}
.header-sub{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:16px;max-width:480px;line-height:1.7;}
.lang-toggle{position:absolute;top:0;right:0;display:flex;border:1px solid var(--border2);border-radius:4px;overflow:hidden;}
.lang-btn{padding:6px 14px;font-size:11px;font-family:var(--mono);letter-spacing:2px;cursor:pointer;background:transparent;border:none;color:var(--muted);transition:all 0.2s;}
.lang-btn.active{background:var(--ink);color:var(--paper);}
.search-section{margin-bottom:48px;}
.search-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:block;}
.search-row{display:flex;border:1.5px solid var(--ink);border-radius:2px;overflow:hidden;background:var(--paper);transition:box-shadow 0.2s;}
.search-row:focus-within{box-shadow:4px 4px 0 var(--ink);}
.search-input{flex:1;padding:16px 20px;font-size:18px;font-family:var(--serif);font-weight:300;font-style:italic;background:transparent;border:none;color:var(--ink);outline:none;}
.search-input::placeholder{color:var(--muted);opacity:0.7;}
.analyze-btn{padding:16px 28px;background:var(--ink);color:var(--paper);border:none;font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
.analyze-btn:hover{background:var(--accent);}
.analyze-btn:disabled{background:var(--muted);cursor:not-allowed;}
.examples{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.example-tag{font-size:11px;padding:4px 10px;border:1px solid var(--border2);border-radius:2px;color:var(--muted);cursor:pointer;transition:all 0.15s;background:transparent;font-family:var(--mono);}
.example-tag:hover{border-color:var(--ink);color:var(--ink);background:var(--paper2);}
.loading-state{display:none;padding:48px 0;}
.loading-state.visible{display:block;}
.loading-line{width:100%;height:1px;background:var(--border);position:relative;overflow:hidden;margin-bottom:16px;}
.loading-line::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,var(--ink),transparent);animation:scan 1.5s ease-in-out infinite;}
@keyframes scan{to{left:140%;}}
.loading-text{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);animation:blink 1.2s ease-in-out infinite;}
.loading-step{font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:1px;opacity:0.7;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.result-section{display:none;animation:fadeUp 0.5s ease forwards;}
.result-section.visible{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.company-header{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:24px;margin-bottom:24px;border-bottom:1.5px solid var(--ink);gap:24px;}
.company-name{font-family:var(--serif);font-size:clamp(28px,4vw,48px);font-weight:300;letter-spacing:-0.5px;line-height:1.1;}
.company-meta{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:1px;}
.notion-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:3px 8px;background:rgba(42,92,69,0.1);color:var(--accent2);border:1px solid rgba(42,92,69,0.2);border-radius:2px;margin-top:6px;letter-spacing:1px;}
.scores-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;}
.score-card{padding:20px;border:1px solid var(--border2);background:var(--paper2);}
.score-card-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.score-card-main{display:flex;align-items:baseline;gap:12px;}
.score-big{font-family:var(--serif);font-size:36px;font-weight:300;}
.score-verdict{font-size:11px;padding:4px 10px;border-radius:2px;font-family:var(--mono);letter-spacing:1px;}
.verdict-agnt{color:var(--accent2);border:1px solid var(--accent2);background:rgba(42,92,69,0.06);}
.verdict-risk{color:var(--accent);border:1px solid var(--accent);background:rgba(200,75,47,0.06);}
.verdict-watch{color:var(--accent3);border:1px solid var(--accent3);background:rgba(26,58,107,0.06);}
.score-trend{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;}
.section-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.laws-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border2);border:1px solid var(--border2);margin-bottom:32px;}
.law-card{background:var(--paper);padding:24px 20px;}
.law-name{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.law-scores{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
.law-score-now{font-family:var(--serif);font-size:32px;font-weight:300;line-height:1;}
.law-score-now .denom{font-size:16px;color:var(--muted);}
.law-score-proj{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.arrow-up{color:var(--accent2);}
.arrow-down{color:var(--accent);}
.arrow-same{color:var(--muted);}
.law-dots{display:flex;gap:4px;margin-bottom:12px;}
.law-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--border2);background:var(--paper2);}
.law-dot.filled{background:var(--ink);border-color:var(--ink);}
.law-dot.proj{background:transparent;border:1px dashed var(--muted);}
.law-analysis{font-size:11px;color:var(--muted);line-height:1.7;}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px;}
.content-block{padding:24px;background:var(--paper2);border:1px solid var(--border);}
.block-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.block-content{font-size:13px;line-height:1.75;color:var(--ink);}
.notion-block{padding:24px;background:rgba(42,92,69,0.05);border:1px solid rgba(42,92,69,0.2);margin-bottom:32px;}
.notion-block-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.notion-entries{display:flex;flex-direction:column;gap:8px;}
.notion-entry{font-size:12px;line-height:1.6;color:var(--ink);padding:8px 12px;background:var(--paper);border-left:2px solid var(--accent2);}
.notion-entry-meta{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:1px;}
.recommendation{padding:32px;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);margin-bottom:32px;position:relative;}
.recommendation::before{content:'"';position:absolute;top:-20px;left:28px;font-family:var(--serif);font-size:80px;color:var(--ink);line-height:1;}
.rec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,240,232,0.4);margin-bottom:12px;}
.rec-text{font-family:var(--serif);font-size:18px;font-weight:300;font-style:italic;line-height:1.6;color:var(--paper);}
.result-actions{display:flex;gap:12px;padding-top:24px;border-top:1px solid var(--border);flex-wrap:wrap;}
.action-btn{padding:10px 20px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.15s;}
.action-primary{background:var(--ink);color:var(--paper);border:1px solid var(--ink);}
.action-primary:hover{background:var(--accent);border-color:var(--accent);}
.action-secondary{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.action-secondary:hover{border-color:var(--ink);color:var(--ink);}
.action-notion{background:transparent;color:var(--accent2);border:1px solid rgba(42,92,69,0.3);}
.action-notion:hover{background:rgba(42,92,69,0.08);}
.history-section{margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.history-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.history-list{display:flex;flex-wrap:wrap;gap:8px;}
.history-item{font-size:11px;padding:6px 12px;border:1px solid var(--border2);border-radius:2px;color:var(--muted);cursor:pointer;font-family:var(--mono);display:flex;align-items:center;gap:8px;transition:all 0.15s;}
.history-item:hover{border-color:var(--ink);color:var(--ink);}
.history-verdict{width:6px;height:6px;border-radius:50%;}
@media(max-width:640px){.container{padding:32px 20px;}.laws-grid{grid-template-columns:1fr;}.content-grid{grid-template-columns:1fr;}.company-header{flex-direction:column;}.scores-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="header-eyebrow">Outil d'analyse</div>
    <h1>SaaS<br><em>Intelligence</em></h1>
    <p class="header-sub">Analyse stratégique instantanée. Framework Orchestration Economics — Three Laws, AGNT Thesis, Embedded Option.</p>
  </div>

  <div class="search-section">
    <label class="search-label">Nom de la société</label>
    <div class="search-row">
      <input class="search-input" id="search-input" placeholder="Ex: Pennylane, Salesforce, Doctolib..." onkeydown="if(event.key==='Enter')analyze()">
      <button class="analyze-btn" id="analyze-btn" onclick="analyze()">Analyser →</button>
    </div>
    <div class="examples">
      <span style="font-size:10px;color:var(--muted);letter-spacing:1px;">Essayer :</span>
      <button class="example-tag" onclick="setExample('Pennylane')">Pennylane</button>
      <button class="example-tag" onclick="setExample('Salesforce')">Salesforce</button>
      <button class="example-tag" onclick="setExample('Doctolib')">Doctolib</button>
      <button class="example-tag" onclick="setExample('Mistral AI')">Mistral AI</button>
      <button class="example-tag" onclick="setExample('Notion')">Notion</button>
    </div>
  </div>

  <div class="loading-state" id="loading">
    <div class="loading-line"></div>
    <div class="loading-text" id="loading-text">Analyse en cours...</div>
    <div class="loading-step" id="loading-step"></div>
  </div>

  <div class="result-section" id="result"></div>

  <div class="history-section" id="history-section" style="display:none;">
    <div class="history-title">Analyses récentes</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
const NOTION_DB_ID = '3746a6cbdda380e9a6c5e2ab0e29b4f5';
const NOTION_PROXY = 'https://notion-proxy.vercel.app'; // on utilisera un proxy
let currentLang = 'fr';
let analysisHistory = JSON.parse(localStorage.getItem('analysis_history_v2') || '[]');

function getApiKey() {
  let key = localStorage.getItem('saas_key');
  if (!key) {
    key = prompt('Clé API Anthropic (sk-ant-...) :');
    if (key) localStorage.setItem('saas_key', key);
  }
  return key;
}

function getNotionKey() {
  let key = localStorage.getItem('notion_key');
  if (!key) {
    key = prompt('Clé API Notion (secret_...) :');
    if (key) localStorage.setItem('notion_key', key);
  }
  return key;
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
}

function setExample(name) {
  document.getElementById('search-input').value = name;
  document.getElementById('search-input').focus();
}

async function fetchNotionNotes(company) {
  const notionKey = getNotionKey();
  if (!notionKey) return [];
  
  try {
    // Notion API via fetch direct avec CORS header
    const response = await fetch(`https://api.notion.com/v1/databases/${NOTION_DB_ID}/query`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${notionKey}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      },
      body: JSON.stringify({
        filter: {
          property: 'Société',
          rich_text: { contains: company }
        },
        sorts: [{ property: 'date', direction: 'descending' }],
        page_size: 10
      })
    });
    
    if (!response.ok) return [];
    const data = await response.json();
    
    return data.results.map(page => ({
      title: page.properties['Name']?.title?.[0]?.plain_text || '',
      date: page.properties['date']?.date?.start || '',
      source: page.properties['Source']?.rich_text?.[0]?.plain_text || '',
      confidential: page.properties['Confidentiel']?.checkbox || false
    })).filter(n => n.title);
  } catch (e) {
    console.log('Notion fetch error:', e);
    return [];
  }
}

function getPrompt(company, notes, lang) {
  const notesText = notes.length > 0 
    ? `\n\nNOTES PRIVÉES SUR CETTE SOCIÉTÉ (informations confidentielles et récentes):\n${notes.map(n => `- [${n.date}${n.source ? ' / ' + n.source : ''}${n.confidential ? ' / CONFIDENTIEL' : ''}] ${n.title}`).join('\n')}`
    : '';

  if (lang === 'fr') {
    return `Tu es un analyste senior chez un fonds d'investissement tech utilisant le framework "Orchestration Economics" de Raphaëlle d'Ornano.

Analyse la société "${company}" selon ce framework. Recherche des informations factuelles récentes sur internet (actualité, levées de fonds, nouveaux produits, résultats, partenariats).${notesText}

Génère DEUX scores :
1. Score ACTUEL : basé sur la situation aujourd'hui
2. Score PROJETÉ : basé sur la trajectoire probable dans 12-18 mois

Réponds UNIQUEMENT en JSON valide :
{
  "company": "Nom exact",
  "tagline": "Description 8 mots max",
  "sector": "Secteur",
  "founded": "Année",
  "stage": "Startup / Scale-up / Mature",
  "has_notion_notes": ${notes.length > 0},
  "law1_score_now": 2,
  "law1_score_proj": 3,
  "law1_name": "Proximity to Intent",
  "law1_analysis": "Analyse actuelle en 2 phrases",
  "law1_projection": "Pourquoi le score va évoluer en 1 phrase",
  "law2_score_now": 2,
  "law2_score_proj": 2,
  "law2_name": "Context Depth",
  "law2_analysis": "Analyse actuelle en 2 phrases",
  "law2_projection": "Pourquoi le score va évoluer en 1 phrase",
  "law3_score_now": 3,
  "law3_score_proj": 3,
  "law3_name": "Workflow Intelligence",
  "law3_analysis": "Analyse actuelle en 2 phrases",
  "law3_projection": "Pourquoi le score va évoluer en 1 phrase",
  "verdict_now": "AGNT",
  "verdict_proj": "AGNT",
  "score_now_total": 7,
  "score_proj_total": 8,
  "embedded_option": "3 phrases sur l'option cachée",
  "main_risk": "2 phrases sur le risque principal",
  "notion_synthesis": "${notes.length > 0 ? 'Synthèse de 2 phrases intégrant les notes privées dans l analyse' : ''}",
  "recommendation": "2-3 phrases percutantes style memo d'investissement"
}

verdict_now et verdict_proj doivent être "AGNT", "AT_RISK" ou "WATCH". score_now_total et score_proj_total sont la somme des 3 scores. Réponds UNIQUEMENT avec le JSON.`;
  } else {
    return `You are a senior analyst at a tech investment fund using Raphaëlle d'Ornano's "Orchestration Economics" framework.

Analyze "${company}". Search for recent factual information online (news, fundraising, new products, results, partnerships).${notesText}

Generate TWO scores:
1. CURRENT score: based on today's situation  
2. PROJECTED score: based on probable trajectory in 12-18 months

Reply ONLY with valid JSON:
{
  "company": "Exact name",
  "tagline": "Description max 8 words",
  "sector": "Sector",
  "founded": "Year",
  "stage": "Startup / Scale-up / Mature",
  "has_notion_notes": ${notes.length > 0},
  "law1_score_now": 2,
  "law1_score_proj": 3,
  "law1_name": "Proximity to Intent",
  "law1_analysis": "Current 2-sentence analysis",
  "law1_projection": "Why score will evolve in 1 sentence",
  "law2_score_now": 2,
  "law2_score_proj": 2,
  "law2_name": "Context Depth",
  "law2_analysis": "Current 2-sentence analysis",
  "law2_projection": "Why score will evolve in 1 sentence",
  "law3_score_now": 3,
  "law3_score_proj": 3,
  "law3_name": "Workflow Intelligence",
  "law3_analysis": "Current 2-sentence analysis",
  "law3_projection": "Why score will evolve in 1 sentence",
  "verdict_now": "AGNT",
  "verdict_proj": "AGNT",
  "score_now_total": 7,
  "score_proj_total": 8,
  "embedded_option": "3 sentences on hidden option",
  "main_risk": "2 sentences on main risk",
  "notion_synthesis": "${notes.length > 0 ? '2-sentence synthesis integrating private notes' : ''}",
  "recommendation": "2-3 punchy sentences like investment memo"
}

verdict fields must be "AGNT", "AT_RISK" or "WATCH". Reply ONLY with JSON.`;
  }
}

async function analyze() {
  const company = document.getElementById('search-input').value.trim();
  if (!company) return;

  const apiKey = getApiKey();
  if (!apiKey) return;

  document.getElementById('loading').classList.add('visible');
  document.getElementById('result').classList.remove('visible');
  document.getElementById('result').style.display = 'none';
  document.getElementById('analyze-btn').disabled = true;

  // Step 1: Fetch Notion notes
  document.getElementById('loading-step').textContent = currentLang === 'fr' ? '① Lecture de votre Knowledge Base...' : '① Reading your Knowledge Base...';
  const notes = await fetchNotionNotes(company);
  
  // Step 2: Analyze
  document.getElementById('loading-step').textContent = currentLang === 'fr' 
    ? `② Analyse en cours${notes.length > 0 ? ` (${notes.length} note(s) privée(s) trouvée(s))` : ''}...`
    : `② Analyzing${notes.length > 0 ? ` (${notes.length} private note(s) found)` : ''}...`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: getPrompt(company, notes, currentLang) }]
      })
    });

    const data = await response.json();
    let text = '';
    if (data.content) {
      for (const block of data.content) {
        if (block.type === 'text') text += block.text;
      }
    }

    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON found');
    const memo = JSON.parse(jsonMatch[0]);

    renderResult(memo, notes);
    saveToHistory(memo);

  } catch (err) {
    document.getElementById('result').innerHTML = `<div style="padding:24px;border:1px solid var(--accent);color:var(--accent);font-size:13px;">Erreur d'analyse. Vérifie ta clé API.<br><small style="opacity:0.6">${err.message}</small></div>`;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').classList.add('visible');
  }

  document.getElementById('loading').classList.remove('visible');
  document.getElementById('analyze-btn').disabled = false;
}

function verdictClass(v) {
  return v === 'AGNT' ? 'verdict-agnt' : v === 'AT_RISK' ? 'verdict-risk' : 'verdict-watch';
}

function trendArrow(now, proj) {
  if (proj > now) return '<span class="arrow-up">↑</span>';
  if (proj < now) return '<span class="arrow-down">↓</span>';
  return '<span class="arrow-same">→</span>';
}

function dots(scoreNow, scoreProj) {
  let h = '';
  for (let i = 1; i <= 3; i++) {
    if (i <= scoreNow) h += `<div class="law-dot filled"></div>`;
    else if (i <= scoreProj) h += `<div class="law-dot proj"></div>`;
    else h += `<div class="law-dot"></div>`;
  }
  return h;
}

function renderResult(m, notes) {
  const labels = currentLang === 'fr' ? {
    scoreNow: 'Score actuel', scoreProj: 'Score projeté (12-18 mois)',
    laws: 'Analyse — Three Laws', option: 'Option cachée', risk: 'Risque principal',
    rec: 'Recommandation', newAnalysis: 'Nouvelle analyse', copy: 'Copier le memo',
    addNote: 'Ajouter une note Notion', notionNotes: 'Notes privées intégrées',
    dotsFilled: '● actuel  ○ projeté', projection: 'Projection'
  } : {
    scoreNow: 'Current score', scoreProj: 'Projected score (12-18 months)',
    laws: 'Analysis — Three Laws', option: 'Embedded Option', risk: 'Main Risk',
    rec: 'Recommendation', newAnalysis: 'New analysis', copy: 'Copy memo',
    addNote: 'Add Notion note', notionNotes: 'Private notes integrated',
    dotsFilled: '● current  ○ projected', projection: 'Projection'
  };

  const notionSection = notes.length > 0 ? `
    <div class="notion-block">
      <div class="notion-block-title">◈ ${labels.notionNotes} (${notes.length})</div>
      ${m.notion_synthesis ? `<div style="font-size:13px;color:var(--ink);line-height:1.7;margin-bottom:16px;font-style:italic;">${m.notion_synthesis}</div>` : ''}
      <div class="notion-entries">
        ${notes.map(n => `
          <div class="notion-entry">
            <div class="notion-entry-meta">${n.date}${n.source ? ' · ' + n.source : ''}${n.confidential ? ' · CONFIDENTIEL' : ''}</div>
            ${n.title}
          </div>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('result').innerHTML = `
    <div class="company-header">
      <div>
        <div class="company-name">${m.company}</div>
        <div class="company-meta">${m.sector} · ${m.stage} · Est. ${m.founded} · ${m.tagline}</div>
        ${notes.length > 0 ? `<div class="notion-badge">◈ ${notes.length} note(s) Notion</div>` : ''}
      </div>
    </div>

    <div class="scores-row">
      <div class="score-card">
        <div class="score-card-label">${labels.scoreNow}</div>
        <div class="score-card-main">
          <div class="score-big">${m.score_now_total}<span style="font-size:18px;color:var(--muted)">/9</span></div>
          <div class="score-verdict ${verdictClass(m.verdict_now)}">${m.verdict_now}</div>
        </div>
        <div class="score-trend">Aujourd'hui · Basé sur les données publiques</div>
      </div>
      <div class="score-card">
        <div class="score-card-label">${labels.scoreProj}</div>
        <div class="score-card-main">
          <div class="score-big">${trendArrow(m.score_now_total, m.score_proj_total)} ${m.score_proj_total}<span style="font-size:18px;color:var(--muted)">/9</span></div>
          <div class="score-verdict ${verdictClass(m.verdict_proj)}">${m.verdict_proj}</div>
        </div>
        <div class="score-trend">Dans 12-18 mois · Basé sur la trajectoire</div>
      </div>
    </div>

    <div class="section-title">${labels.laws} <span style="font-size:9px;color:var(--muted);font-weight:300">${labels.dotsFilled}</span></div>
    <div class="laws-grid">
      <div class="law-card">
        <div class="law-name">${m.law1_name}</div>
        <div class="law-scores">
          <div class="law-score-now">${m.law1_score_now}<span class="denom">/3</span></div>
          <div class="law-score-proj">${trendArrow(m.law1_score_now, m.law1_score_proj)} ${m.law1_score_proj}/3</div>
        </div>
        <div class="law-dots">${dots(m.law1_score_now, m.law1_score_proj)}</div>
        <div class="law-analysis">${m.law1_analysis}</div>
        ${m.law1_projection ? `<div style="font-size:10px;color:var(--accent2);margin-top:8px;font-style:italic;">${labels.projection} : ${m.law1_projection}</div>` : ''}
      </div>
      <div class="law-card">
        <div class="law-name">${m.law2_name}</div>
        <div class="law-scores">
          <div class="law-score-now">${m.law2_score_now}<span class="denom">/3</span></div>
          <div class="law-score-proj">${trendArrow(m.law2_score_now, m.law2_score_proj)} ${m.law2_score_proj}/3</div>
        </div>
        <div class="law-dots">${dots(m.law2_score_now, m.law2_score_proj)}</div>
        <div class="law-analysis">${m.law2_analysis}</div>
        ${m.law2_projection ? `<div style="font-size:10px;color:var(--accent2);margin-top:8px;font-style:italic;">${labels.projection} : ${m.law2_projection}</div>` : ''}
      </div>
      <div class="law-card">
        <div class="law-name">${m.law3_name}</div>
        <div class="law-scores">
          <div class="law-score-now">${m.law3_score_now}<span class="denom">/3</span></div>
          <div class="law-score-proj">${trendArrow(m.law3_score_now, m.law3_score_proj)} ${m.law3_score_proj}/3</div>
        </div>
        <div class="law-dots">${dots(m.law3_score_now, m.law3_score_proj)}</div>
        <div class="law-analysis">${m.law3_analysis}</div>
        ${m.law3_projection ? `<div style="font-size:10px;color:var(--accent2);margin-top:8px;font-style:italic;">${labels.projection} : ${m.law3_projection}</div>` : ''}
      </div>
    </div>

    ${notionSection}

    <div class="content-grid">
      <div class="content-block">
        <div class="block-title">${labels.option}</div>
        <div class="block-content">${m.embedded_option}</div>
      </div>
      <div class="content-block">
        <div class="block-title">${labels.risk}</div>
        <div class="block-content">${m.main_risk}</div>
      </div>
    </div>

    <div class="recommendation">
      <div class="rec-label">${labels.rec}</div>
      <div class="rec-text">${m.recommendation}</div>
    </div>

    <div class="result-actions">
      <button class="action-btn action-primary" onclick="resetSearch()">${labels.newAnalysis}</button>
      <button class="action-btn action-secondary" onclick="copyMemo()">${labels.copy}</button>
      <button class="action-btn action-notion" onclick="openNotion()">${labels.addNote}</button>
    </div>
  `;

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').classList.add('visible');
  window._lastMemo = m;
}

function resetSearch() {
  document.getElementById('result').classList.remove('visible');
  document.getElementById('result').style.display = 'none';
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
}

function copyMemo() {
  const m = window._lastMemo;
  if (!m) return;
  const text = `${m.company} — Analyse AGNT\n\nSCORE ACTUEL: ${m.score_now_total}/9 (${m.verdict_now})\nSCORE PROJETÉ: ${m.score_proj_total}/9 (${m.verdict_proj})\n\nTHREE LAWS:\n• ${m.law1_name}: ${m.law1_score_now}/3 → ${m.law1_score_proj}/3\n  ${m.law1_analysis}\n• ${m.law2_name}: ${m.law2_score_now}/3 → ${m.law2_score_proj}/3\n  ${m.law2_analysis}\n• ${m.law3_name}: ${m.law3_score_now}/3 → ${m.law3_score_proj}/3\n  ${m.law3_analysis}\n\nEMBEDDED OPTION:\n${m.embedded_option}\n\nRISQUE:\n${m.main_risk}\n\nRECOMMANDATION:\n${m.recommendation}`;
  navigator.clipboard.writeText(text).then(() => alert('Memo copié !'));
}

function openNotion() {
  window.open(`https://notion.so/${NOTION_DB_ID}`, '_blank');
}

function saveToHistory(memo) {
  analysisHistory = analysisHistory.filter(h => h.company !== memo.company);
  analysisHistory.unshift({ company: memo.company, verdict: memo.verdict_now, sector: memo.sector });
  if (analysisHistory.length > 8) analysisHistory = analysisHistory.slice(0, 8);
  localStorage.setItem('analysis_history_v2', JSON.stringify(analysisHistory));
  renderHistory();
}

function renderHistory() {
  if (analysisHistory.length === 0) return;
  document.getElementById('history-section').style.display = 'block';
  const colors = { AGNT: '#2a5c45', AT_RISK: '#c84b2f', WATCH: '#1a3a6b' };
  document.getElementById('history-list').innerHTML = analysisHistory.map(h =>
    `<div class="history-item" onclick="setExample('${h.company}')">
      <div class="history-verdict" style="background:${colors[h.verdict]||'#8a8070'}"></div>
      ${h.company}
    </div>`
  ).join('');
}

renderHistory();
</script>
</body>
</html>
