<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Intelligence — Analyseur AGNT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0e0c;
  --paper: #f5f0e8;
  --paper2: #ede8dc;
  --paper3: #e3ddd0;
  --accent: #c84b2f;
  --accent2: #2a5c45;
  --accent3: #1a3a6b;
  --muted: #8a8070;
  --border: rgba(15,14,12,0.1);
  --border2: rgba(15,14,12,0.2);
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--mono);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* GRAIN TEXTURE */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 60px 40px;
}

/* HEADER */
.header {
  margin-bottom: 56px;
  position: relative;
}

.header-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-eyebrow::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--muted);
}

.header h1 {
  font-family: var(--serif);
  font-size: clamp(42px, 6vw, 72px);
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--ink);
  margin-bottom: 8px;
}

.header h1 em {
  font-style: italic;
  color: var(--accent);
}

.header-sub {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 16px;
  max-width: 480px;
  line-height: 1.7;
}

.lang-toggle {
  position: absolute;
  top: 0;
  right: 0;
  display: flex;
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
}

.lang-btn {
  padding: 6px 14px;
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 2px;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--muted);
  transition: all 0.2s;
}

.lang-btn.active {
  background: var(--ink);
  color: var(--paper);
}

/* SEARCH BAR */
.search-section {
  margin-bottom: 48px;
}

.search-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: block;
}

.search-row {
  display: flex;
  gap: 0;
  border: 1.5px solid var(--ink);
  border-radius: 2px;
  overflow: hidden;
  background: var(--paper);
  transition: box-shadow 0.2s;
}

.search-row:focus-within {
  box-shadow: 4px 4px 0 var(--ink);
}

.search-input {
  flex: 1;
  padding: 16px 20px;
  font-size: 18px;
  font-family: var(--serif);
  font-weight: 300;
  font-style: italic;
  background: transparent;
  border: none;
  color: var(--ink);
  outline: none;
}

.search-input::placeholder {
  color: var(--muted);
  opacity: 0.7;
}

.analyze-btn {
  padding: 16px 28px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}

.analyze-btn:hover { background: var(--accent); }
.analyze-btn:disabled { background: var(--muted); cursor: not-allowed; }

.examples {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.example-tag {
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  background: transparent;
  font-family: var(--mono);
}

.example-tag:hover {
  border-color: var(--ink);
  color: var(--ink);
  background: var(--paper2);
}

/* LOADING */
.loading-state {
  display: none;
  padding: 48px 0;
  text-align: center;
}

.loading-state.visible { display: block; }

.loading-line {
  width: 100%;
  height: 1px;
  background: var(--border);
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}

.loading-line::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--ink), transparent);
  animation: scan 1.5s ease-in-out infinite;
}

@keyframes scan { to { left: 140%; } }

.loading-text {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* RESULT */
.result-section {
  display: none;
  animation: fadeUp 0.5s ease forwards;
}

.result-section.visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* COMPANY HEADER */
.company-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding-bottom: 24px;
  margin-bottom: 32px;
  border-bottom: 1.5px solid var(--ink);
  gap: 24px;
}

.company-name {
  font-family: var(--serif);
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 300;
  letter-spacing: -0.5px;
  line-height: 1.1;
}

.company-meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 1px;
}

.agnt-verdict {
  flex-shrink: 0;
  text-align: right;
}

.verdict-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.verdict-badge {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  padding: 8px 16px;
  border: 2px solid;
  display: inline-block;
  border-radius: 2px;
}

.verdict-agnt { color: var(--accent2); border-color: var(--accent2); background: rgba(42,92,69,0.06); }
.verdict-risk { color: var(--accent); border-color: var(--accent); background: rgba(200,75,47,0.06); }
.verdict-watch { color: var(--accent3); border-color: var(--accent3); background: rgba(26,58,107,0.06); }

/* THREE LAWS */
.section-title {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.laws-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border2);
  border: 1px solid var(--border2);
  margin-bottom: 40px;
}

.law-card {
  background: var(--paper);
  padding: 24px 20px;
}

.law-name {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.law-score {
  font-family: var(--serif);
  font-size: 40px;
  font-weight: 300;
  line-height: 1;
  margin-bottom: 8px;
}

.law-score .denom {
  font-size: 18px;
  color: var(--muted);
}

.law-dots {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}

.law-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--paper2);
}

.law-dot.filled { background: var(--ink); border-color: var(--ink); }

.law-analysis {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.7;
}

/* CONTENT BLOCKS */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}

.content-block {
  padding: 24px;
  background: var(--paper2);
  border: 1px solid var(--border);
}

.block-title {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.block-content {
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink);
}

/* RECOMMENDATION */
.recommendation {
  padding: 32px;
  border: 1.5px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  margin-bottom: 32px;
  position: relative;
}

.recommendation::before {
  content: '"';
  position: absolute;
  top: -20px;
  left: 28px;
  font-family: var(--serif);
  font-size: 80px;
  color: var(--ink);
  line-height: 1;
}

.rec-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(245,240,232,0.4);
  margin-bottom: 12px;
}

.rec-text {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  line-height: 1.6;
  color: var(--paper);
}

/* FOOTER ACTIONS */
.result-actions {
  display: flex;
  gap: 12px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.action-btn {
  padding: 10px 20px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}

.action-primary {
  background: var(--ink);
  color: var(--paper);
  border: 1px solid var(--ink);
}

.action-primary:hover { background: var(--accent); border-color: var(--accent); }

.action-secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border2);
}

.action-secondary:hover { border-color: var(--ink); color: var(--ink); }

/* HISTORY */
.history-section {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
}

.history-title {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.history-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.history-item {
  font-size: 11px;
  padding: 6px 12px;
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}

.history-item:hover { border-color: var(--ink); color: var(--ink); }

.history-verdict {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

@media (max-width: 640px) {
  .container { padding: 32px 20px; }
  .laws-grid { grid-template-columns: 1fr; }
  .content-grid { grid-template-columns: 1fr; }
  .company-header { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div class="header-eyebrow">Outil d'analyse</div>
    <h1>SaaS<br><em>Intelligence</em></h1>
    <p class="header-sub" id="header-sub">Analyse stratégique instantanée. Framework Orchestration Economics — Three Laws, AGNT Thesis, Embedded Option.</p>
  </div>

  <div class="search-section">
    <label class="search-label" id="search-label">Nom de la société</label>
    <div class="search-row">
      <input class="search-input" id="search-input" placeholder="Ex: Pennylane, Salesforce, Doctolib..." onkeydown="if(event.key==='Enter')analyze()">
      <button class="analyze-btn" id="analyze-btn" onclick="analyze()" id="analyze-label">Analyser →</button>
    </div>
    <div class="examples">
      <span class="example-label" style="font-size:10px;color:var(--muted);letter-spacing:1px;align-self:center;">Essayer :</span>
      <button class="example-tag" onclick="setExample('Pennylane')">Pennylane</button>
      <button class="example-tag" onclick="setExample('Salesforce')">Salesforce</button>
      <button class="example-tag" onclick="setExample('Doctolib')">Doctolib</button>
      <button class="example-tag" onclick="setExample('Mistral AI')">Mistral AI</button>
      <button class="example-tag" onclick="setExample('Notion')">Notion</button>
    </div>
  </div>

  <div class="loading-state" id="loading">
    <div class="loading-line"></div>
    <div class="loading-text" id="loading-text">Analyse en cours...</div>
  </div>

  <div class="result-section" id="result"></div>

  <div class="history-section" id="history-section" style="display:none;">
    <div class="history-title">Analyses récentes</div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
const API_KEY = localStorage.getItem('saas_analyzer_key') || '';
let currentLang = 'fr';
let analysisHistory = JSON.parse(localStorage.getItem('analysis_history') || '[]');

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  
  if (lang === 'fr') {
    document.getElementById('header-sub').textContent = 'Analyse stratégique instantanée. Framework Orchestration Economics — Three Laws, AGNT Thesis, Embedded Option.';
    document.getElementById('search-label').textContent = 'Nom de la société';
    document.getElementById('analyze-btn').textContent = 'Analyser →';
    document.getElementById('loading-text').textContent = 'Analyse en cours...';
  } else {
    document.getElementById('header-sub').textContent = 'Instant strategic analysis. Orchestration Economics Framework — Three Laws, AGNT Thesis, Embedded Option.';
    document.getElementById('search-label').textContent = 'Company name';
    document.getElementById('analyze-btn').textContent = 'Analyze →';
    document.getElementById('loading-text').textContent = 'Analyzing...';
  }
}

function setExample(name) {
  document.getElementById('search-input').value = name;
  document.getElementById('search-input').focus();
}

function getPrompt(company, lang) {
  if (lang === 'fr') {
    return `Tu es un analyste senior chez un fonds d'investissement tech utilisant le framework "Orchestration Economics" de Raphaëlle d'Ornano.

Analyse la société "${company}" selon ce framework. Recherche des informations factuelles sur cette société (secteur, produit, clients, revenus estimés, positionnement, concurrents).

Réponds UNIQUEMENT en JSON valide avec exactement cette structure :
{
  "company": "Nom exact de la société",
  "tagline": "Description en 8 mots max",
  "sector": "Secteur / catégorie",
  "founded": "Année de fondation approximative",
  "stage": "Stade (Startup / Scale-up / Mature)",
  "law1_score": 2,
  "law1_name": "Proximity to Intent",
  "law1_analysis": "Analyse en 2 phrases de la proximité avec l'intention utilisateur",
  "law2_score": 3,
  "law2_name": "Context Depth",
  "law2_analysis": "Analyse en 2 phrases de la profondeur du contexte accumulé",
  "law3_score": 2,
  "law3_name": "Workflow Intelligence",
  "law3_analysis": "Analyse en 2 phrases de l'intégration dans les workflows",
  "embedded_option": "Description en 3 phrases de l'option cachée non pricée par le marché",
  "main_risk": "Principal risque en 2 phrases",
  "verdict": "AGNT",
  "verdict_detail": "AGNT / AT_RISK / WATCH",
  "recommendation": "Recommandation en 2-3 phrases percutantes comme un memo d'investissement"
}

Les scores sont sur 3. verdict_detail doit être exactement "AGNT", "AT_RISK", ou "WATCH". Réponds UNIQUEMENT avec le JSON, aucun texte avant ou après.`;
  } else {
    return `You are a senior analyst at a tech investment fund using Raphaëlle d'Ornano's "Orchestration Economics" framework.

Analyze the company "${company}" using this framework. Research factual information about this company (sector, product, clients, estimated revenues, positioning, competitors).

Reply ONLY with valid JSON using exactly this structure:
{
  "company": "Exact company name",
  "tagline": "Description in max 8 words",
  "sector": "Sector / category",
  "founded": "Approximate founding year",
  "stage": "Stage (Startup / Scale-up / Mature)",
  "law1_score": 2,
  "law1_name": "Proximity to Intent",
  "law1_analysis": "2-sentence analysis of proximity to user intent",
  "law2_score": 3,
  "law2_name": "Context Depth",
  "law2_analysis": "2-sentence analysis of accumulated context depth",
  "law3_score": 2,
  "law3_name": "Workflow Intelligence",
  "law3_analysis": "2-sentence analysis of workflow integration",
  "embedded_option": "3-sentence description of the hidden option not yet priced by the market",
  "main_risk": "Main risk in 2 sentences",
  "verdict": "AGNT",
  "verdict_detail": "AGNT",
  "recommendation": "2-3 punchy sentences like an investment memo"
}

Scores are out of 3. verdict_detail must be exactly "AGNT", "AT_RISK", or "WATCH". Reply ONLY with the JSON, no text before or after.`;
  }
}

async function analyze() {
  const company = document.getElementById('search-input').value.trim();
  if (!company) return;

  const key = localStorage.getItem('saas_analyzer_key');
  if (!key) {
    const userKey = prompt('Entre ta clé API Anthropic (sk-ant-...) :');
    if (!userKey) return;
    localStorage.setItem('saas_analyzer_key', userKey);
  }

  document.getElementById('loading').classList.add('visible');
  document.getElementById('result').classList.remove('visible');
  document.getElementById('result').style.display = 'none';
  document.getElementById('analyze-btn').disabled = true;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': localStorage.getItem('saas_analyzer_key'),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: getPrompt(company, currentLang) }]
      })
    });

    const data = await response.json();
    
    // Extract text from response
    let text = '';
    if (data.content) {
      for (const block of data.content) {
        if (block.type === 'text') text += block.text;
      }
    }

    // Parse JSON
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON found');
    const memo = JSON.parse(jsonMatch[0]);

    renderResult(memo);
    saveToHistory(memo);

  } catch (err) {
    document.getElementById('result').innerHTML = `<div style="padding:24px;border:1px solid var(--accent);color:var(--accent);font-size:13px;">Erreur d'analyse. Vérifie ta clé API et réessaie.<br><small style="opacity:0.6">${err.message}</small></div>`;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').classList.add('visible');
  }

  document.getElementById('loading').classList.remove('visible');
  document.getElementById('analyze-btn').disabled = false;
}

function renderResult(m) {
  const verdictClass = m.verdict_detail === 'AGNT' ? 'verdict-agnt' : m.verdict_detail === 'AT_RISK' ? 'verdict-risk' : 'verdict-watch';
  const verdictLabel = m.verdict_detail === 'AGNT' ? (currentLang === 'fr' ? 'AGNT Confirmé' : 'AGNT Confirmed') : m.verdict_detail === 'AT_RISK' ? (currentLang === 'fr' ? 'À Risque' : 'At Risk') : 'Watch';

  function dots(score) {
    let h = '';
    for (let i = 1; i <= 3; i++) h += `<div class="law-dot ${i <= score ? 'filled' : ''}"></div>`;
    return h;
  }

  const labels = currentLang === 'fr' ? {
    laws: 'Analyse — Three Laws',
    option: 'Option cachée (Embedded Option)',
    risk: 'Risque Principal',
    rec: 'Recommandation',
    newAnalysis: 'Nouvelle analyse',
    copy: 'Copier le memo'
  } : {
    laws: 'Analysis — Three Laws',
    option: 'Embedded Option',
    risk: 'Main Risk',
    rec: 'Recommendation',
    newAnalysis: 'New analysis',
    copy: 'Copy memo'
  };

  document.getElementById('result').innerHTML = `
    <div class="company-header">
      <div>
        <div class="company-name">${m.company}</div>
        <div class="company-meta">${m.sector} · ${m.stage} · Est. ${m.founded} · ${m.tagline}</div>
      </div>
      <div class="agnt-verdict">
        <div class="verdict-label">AGNT Score</div>
        <div class="verdict-badge ${verdictClass}">${verdictLabel}</div>
      </div>
    </div>

    <div class="section-title">${labels.laws}</div>
    <div class="laws-grid">
      <div class="law-card">
        <div class="law-name">${m.law1_name}</div>
        <div class="law-score">${m.law1_score}<span class="denom">/3</span></div>
        <div class="law-dots">${dots(m.law1_score)}</div>
        <div class="law-analysis">${m.law1_analysis}</div>
      </div>
      <div class="law-card">
        <div class="law-name">${m.law2_name}</div>
        <div class="law-score">${m.law2_score}<span class="denom">/3</span></div>
        <div class="law-dots">${dots(m.law2_score)}</div>
        <div class="law-analysis">${m.law2_analysis}</div>
      </div>
      <div class="law-card">
        <div class="law-name">${m.law3_name}</div>
        <div class="law-score">${m.law3_score}<span class="denom">/3</span></div>
        <div class="law-dots">${dots(m.law3_score)}</div>
        <div class="law-analysis">${m.law3_analysis}</div>
      </div>
    </div>

    <div class="content-grid">
      <div class="content-block">
        <div class="block-title">${labels.option}</div>
        <div class="block-content">${m.embedded_option}</div>
      </div>
      <div class="content-block">
        <div class="block-title">${labels.risk}</div>
        <div class="block-content">${m.main_risk}</div>
      </div>
    </div>

    <div class="recommendation">
      <div class="rec-label">${labels.rec}</div>
      <div class="rec-text">${m.recommendation}</div>
    </div>

    <div class="result-actions">
      <button class="action-btn action-primary" onclick="resetSearch()">${labels.newAnalysis}</button>
      <button class="action-btn action-secondary" onclick="copyMemo()">${labels.copy}</button>
    </div>
  `;

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').classList.add('visible');
  window._lastMemo = m;
}

function resetSearch() {
  document.getElementById('result').classList.remove('visible');
  document.getElementById('result').style.display = 'none';
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
}

function copyMemo() {
  const m = window._lastMemo;
  if (!m) return;
  const text = `${m.company} — Analyse AGNT\n\nVERDICT: ${m.verdict_detail}\n\nTHREE LAWS:\n• ${m.law1_name}: ${m.law1_score}/3 — ${m.law1_analysis}\n• ${m.law2_name}: ${m.law2_score}/3 — ${m.law2_analysis}\n• ${m.law3_name}: ${m.law3_score}/3 — ${m.law3_analysis}\n\nEMBEDDED OPTION:\n${m.embedded_option}\n\nRISQUE PRINCIPAL:\n${m.main_risk}\n\nRECOMMANDATION:\n${m.recommendation}`;
  navigator.clipboard.writeText(text).then(() => alert('Memo copié !'));
}

function saveToHistory(memo) {
  analysisHistory = analysisHistory.filter(h => h.company !== memo.company);
  analysisHistory.unshift({ company: memo.company, verdict: memo.verdict_detail, sector: memo.sector });
  if (analysisHistory.length > 8) analysisHistory = analysisHistory.slice(0, 8);
  localStorage.setItem('analysis_history', JSON.stringify(analysisHistory));
  renderHistory();
}

function renderHistory() {
  if (analysisHistory.length === 0) return;
  document.getElementById('history-section').style.display = 'block';
  const colors = { AGNT: '#2a5c45', AT_RISK: '#c84b2f', WATCH: '#1a3a6b' };
  document.getElementById('history-list').innerHTML = analysisHistory.map(h =>
    `<div class="history-item" onclick="setExample('${h.company}')">
      <div class="history-verdict" style="background:${colors[h.verdict] || '#8a8070'}"></div>
      ${h.company}
    </div>`
  ).join('');
}

renderHistory();
</script>
</body>
</html>
